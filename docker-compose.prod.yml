services:

  db:
    image: mariadb:11
    restart: always
    env_file: .env.prod
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  wordpress:
    build:
      context: .
      target: prod
      args:
        PLUGIN_SLUG: ${PLUGIN_SLUG}
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.prod
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      WORDPRESS_DEBUG: "false"
    volumes:
      - ./volumes/wp-core:/var/www/html
      - ./volumes/wp-content:/var/www/html/wp-content
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  wpcli:
    build:
      context: .
      target: prod
      args:
        PLUGIN_SLUG: ${PLUGIN_SLUG}
    user: www-data
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_healthy
    env_file: .env.prod
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./volumes/wp-core:/var/www/html
      - ./volumes/wp-content:/var/www/html/wp-content
    entrypoint: ["/usr/local/bin/setup.sh"]

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./volumes/wp-core:/var/www/html:ro
      - ./volumes/wp-content:/var/www/html/wp-content:ro
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data: